name: Schedule Proof Test

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  prove:
    runs-on: ubuntu-latest

    steps:
      - name: Mark run
        run: |
          echo "=== SCHEDULE TEST RUN ==="
          echo "Time: $(date)"
          echo "Event: ${{ github.event_name }}"
